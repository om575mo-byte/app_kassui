<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>渇水状況モニター | DroughtWatch</title>
  <meta name="description" content="ダム・河川の渇水状況をリアルタイムで地図上に表示するモニタリングアプリ" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="./css/index.css" />
  <link rel="stylesheet" href="./css/map.css" />
  <link rel="stylesheet" href="./css/dashboard.css" />
</head>

<body>
  <!-- ヘッダー -->
  <header id="app-header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-icon">💧</span>
        <div class="logo-text">
          <h1>渇水モニター</h1>
          <span
            class="logo-region">※このサイトは、国や都道府県等、公的機関が作成したものではありません。正確な情報については、国や都道府県の公式サイトをご確認ください。<br>※AI予測機能は、過去のデータを学習して推論するため、正確な予測結果を保証するものではありません。また、洪水を予測するものではありません。</span>
        </div>
      </div>
    </div>
    <div class="header-center">
      <div id="last-updated" class="update-badge">
        <span class="pulse-dot"></span>
        <span class="update-text">読み込み中...</span>
      </div>
    </div>
    <div class="header-right">
      <button id="btn-toggle-panel" class="btn-icon" title="パネル切替">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>
      </button>
      <button id="btn-refresh" class="btn-icon" title="データ更新">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10" />
          <polyline points="1 20 1 14 7 14" />
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
        </svg>
      </button>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main id="app-main">
    <!-- 地図 -->
    <div id="map-container">
      <div id="map"></div>
      <!-- 凡例 -->
      <div id="map-legend" class="map-overlay">
        <h3>渇水レベル</h3>
        <div class="legend-items">
          <div class="legend-item">
            <span class="legend-dot" style="background: #22c55e;"></span>
            <span>正常（50%以上）</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot" style="background: #eab308;"></span>
            <span>注意（30-50%）</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot" style="background: #f97316;"></span>
            <span>警戒（10-30%）</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot" style="background: #ef4444;"></span>
            <span>危険（10%未満）</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot" style="background: #94a3b8;"></span>
            <span>不明</span>
          </div>
        </div>
      </div>
    </div>

    <!-- サイドパネル -->
    <aside id="side-panel" class="panel-open">
      <!-- 県選択プルダウン -->
      <div id="pref-selector-section" class="panel-section pref-section">
        <label for="pref-select" class="pref-label">🗾 表示県</label>
        <div id="pref-selector"></div>
      </div>

      <!-- サマリーカード -->
      <div id="summary-section" class="panel-section">
        <h2 class="section-title">📊 概要</h2>
        <div id="summary-cards" class="summary-grid">
          <div class="summary-card card-avg">
            <div class="card-label">平均貯水率</div>
            <div class="card-value" id="avg-storage">--</div>
            <div class="card-unit">%</div>
          </div>
          <div class="summary-card card-normal">
            <div class="card-label">🟢 正常</div>
            <div class="card-value" id="count-normal">-</div>
          </div>
          <div class="summary-card card-caution">
            <div class="card-label">🟡 注意</div>
            <div class="card-value" id="count-caution">-</div>
          </div>
          <div class="summary-card card-warning">
            <div class="card-label">🟠 警戒</div>
            <div class="card-value" id="count-warning">-</div>
          </div>
          <div class="summary-card card-critical">
            <div class="card-label">🔴 危険</div>
            <div class="card-value" id="count-critical">-</div>
          </div>
        </div>
      </div>

      <!-- 天気予報 -->
      <div id="weather-section" class="panel-section">
        <h2 class="section-title">🌤 天気予報</h2>
        <div id="weather-content" class="weather-card">
          <p class="loading-text">読み込み中...</p>
        </div>
      </div>

      <!-- ダム一覧 -->
      <div id="dam-list-section" class="panel-section">
        <h2 class="section-title">🏗 ダム一覧</h2>
        <div id="dam-list" class="dam-list">
          <p class="loading-text">読み込み中...</p>
        </div>
      </div>
    </aside>
  </main>

  <!-- 詳細モーダル -->
  <div id="dam-detail-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script type="module" src="./main.js"></script>
</body>

</html>
